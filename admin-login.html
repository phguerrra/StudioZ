<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin — Studio Z</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="form-page">
      <section class="page-hero">
        <div class="container">
          <h1>Área do Administrador</h1>
          <p>Acesso restrito ao painel de pedidos, status e faturamento.</p>
        </div>
      </section>

      <div class="container">
        <form id="adminLoginForm" class="form-card" novalidate>
          <div class="form-group">
            <label for="adminEmail">E-mail admin</label>
            <input type="email" id="adminEmail" name="adminEmail" autocomplete="email" required />
            <span class="error-msg">Informe um e-mail válido.</span>
          </div>
          <div class="form-group">
            <label for="adminPassword">Senha admin</label>
            <input
              type="password"
              id="adminPassword"
              name="adminPassword"
              autocomplete="current-password"
              required
            />
            <span class="error-msg">Informe a senha.</span>
          </div>
          <button type="submit" class="btn btn-pink btn-block">
            <i class="fas fa-user-shield"></i> Entrar no dashboard
          </button>
          <p class="link-muted">
            Área de cliente: <a href="login.html">login comum</a>
          </p>
        </form>
      </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/admin-login-page.js"></script>
  </body>
</html>
